<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librify - Book Scanner & Finder</title>
    <!-- Tailwind CSS CDN for presentation styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- html5-qrcode production library dependency -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        /* Ensures the video container hides native layout shifts cleanly */
        #interactive-reader video {
            width: 100% !important;
            border-radius: 0.5rem;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <div class="max-w-xl mx-auto p-4 sm:p-6">
        <!-- Header -->
        <header class="text-center my-6">
            <h1 class="text-3xl font-extrabold text-indigo-600 tracking-tight">Librify</h1>
            <p class="text-sm text-gray-500 mt-1">Scan a book's barcode or type an ISBN to fetch metadata</p>
        </header>

        <!-- Main Dashboard Actions -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 space-y-4">
            
            <!-- Controls Form -->
            <div class="flex flex-col sm:flex-row gap-3">
                <div class="relative flex-grow">
                    <input type="text" id="isbn-input" placeholder="Enter 10 or 13-digit ISBN..." 
                        class="w-full pl-4 pr-10 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition-all">
                </div>
                <button id="toggle-scan-btn" onclick="toggleScanner()" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-3 rounded-xl text-sm transition-colors shadow-sm cursor-pointer flex items-center justify-center gap-2">
                    <span>Open Scanner</span>
                </button>
            </div>

            <!-- Interactive Camera Scanner Window Section -->
            <div id="scanner-section" class="hidden border-2 border-dashed border-gray-200 rounded-2xl p-3 bg-gray-50 overflow-hidden transition-all duration-300">
                <div id="interactive-reader" class="w-full mx-auto"></div>
                <p class="text-center text-xs text-gray-400 mt-2">Center the book's linear barcode inside the highlighted rectangle box.</p>
            </div>

            <!-- Feedback App Status Log Messages -->
            <div id="status-log" class="hidden text-sm p-3 rounded-xl border font-medium text-center"></div>
        </div>

        <!-- Render Target Output Area -->
        <main id="book-result" class="mt-6"></main>
    </div>

    <!-- Main Core Business Script Execution Block -->
    <script>
        // DOM Nodes Elements Scaffolding References
        const toggleScanBtn = document.getElementById("toggle-scan-btn");
        const scannerSection = document.getElementById("scanner-section");
        const statusLog = document.getElementById("status-log");
        const bookResult = document.getElementById("book-result");
        const isbnInput = document.getElementById("isbn-input");

        // Application Native State Instances
        let html5QrcodeScanner = null;

        // Auto-hook the manual search input typing event listener trigger
        isbnInput.addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                const queryVal = isbnInput.value.trim().replace(/[-\s]/g, "");
                if (queryVal) {
                    fetchBookData(queryVal);
                }
            }
        });

        function showStatus(message, type = "info") {
            statusLog.className = "text-sm p-3 rounded-xl border font-medium text-center block";
            if (type === "error") {
                statusLog.classList.add("bg-red-50", "border-red-200", "text-red-700");
            } else if (type === "success") {
                statusLog.classList.add("bg-green-50", "border-green-200", "text-green-700");
            } else {
                statusLog.classList.add("bg-blue-50", "border-blue-200", "text-blue-700");
            }
            statusLog.innerText = message;
        }

        function clearStatus() {
            statusLog.innerText = "";
            statusLog.className = "hidden";
        }

        function toggleScanner() {
            if (scannerSection.classList.contains("hidden")) {
                scannerSection.classList.remove("hidden");
                toggleScanBtn.innerText = "Close Scanner";
                toggleScanBtn.classList.replace("bg-indigo-600", "bg-gray-600");
                startScanning();
            } else {
                stopScanning();
            }
        }

        function startScanning() {
            if (html5QrcodeScanner) return; // Guard logic loop condition

            // Instantiate native lower-level camera tracking client layout
            html5QrcodeScanner = new Html5Qrcode("interactive-reader");

            const config = {
                fps: 12, // Frame capture intervals processing frequency rate
                // Use adaptive functional viewport bounding configurations for book aspect ratios
                qrbox: (videoWidth, videoHeight) => {
                    const boxWidth = Math.min(videoWidth * 0.85, 320);
                    const boxHeight = Math.min(videoHeight * 0.40, 140);
                    return { width: boxWidth, height: boxHeight };
                },
                // Explicitly tell engine to only parse common international retail product formats
                formatsToSupport: [ 
                    Html5QrcodeSupportedFormats.EAN_13, 
                    Html5QrcodeSupportedFormats.EAN_8 
                ]
            };

            html5QrcodeScanner.start(
                { facingMode: "environment" },
                config,
                onScanSuccess
            ).catch(err => {
                showStatus(`📷 Camera Initialization Failed: ${err}`, "error");
                resetScannerUIState();
            });
        }

        function stopScanning() {
            if (html5QrcodeScanner) {
                // Check inner library state to safely terminate execution
                if (html5QrcodeScanner.isScanning) {
                    html5QrcodeScanner.stop().then(() => {
                        resetScannerUIState();
                    }).catch(err => {
                        console.error("Failed to cleanly disconnect sensor stream: ", err);
                        resetScannerUIState(); // Fallback hard execution reset clear 
                    });
                } else {
                    resetScannerUIState();
                }
            } else {
                resetScannerUIState();
            }
        }

        function resetScannerUIState() {
            html5QrcodeScanner = null;
            scannerSection.classList.add("hidden");
            toggleScanBtn.innerText = "Open Scanner";
            toggleScanBtn.className = "bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-3 rounded-xl text-sm transition-colors shadow-sm cursor-pointer flex items-center justify-center gap-2";
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Instantly sound feedback alerts or logs
            console.log(`Barcode read hit caught: ${decodedText}`, decodedResult);
            isbnInput.value = decodedText;
            
            // Halt camera streaming sequence cleanly 
            stopScanning();
            
            // Query remote Open Library REST endpoint database assets
            fetchBookData(decodedText);
        }

        function fetchBookData(isbn) {
            clearStatus();
            bookResult.innerHTML = `
                <div class="flex items-center justify-center py-12">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
                    <span class="ml-3 text-sm text-gray-500">Querying Open Library Database...</span>
                </div>
            `;

            const cleanIsbn = isbn.trim().replace(/[-\s]/g, "");
            const apiUrl = `https://openlibrary.org/api/books?bibkeys=ISBN:${cleanIsbn}&jscmd=data&format=json`;

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) throw new Error("Network latency caught or offline event triggered.");
                    return response.json();
                })
                .then(data => {
                    const bookKey = `ISBN:${cleanIsbn}`;
                    if (data && data[bookKey]) {
                        showStatus("Book match successfully isolated!", "success");
                        renderBookCard(data[bookKey]);
                    } else {
                        showStatus("No registration logs matched this ISBN barcode inside OpenLibrary indices.", "error");
                        bookResult.innerHTML = "";
                    }
                })
                .catch(err => {
                    showStatus(`System exception mapping data references: ${err.message}`, "error");
                    bookResult.innerHTML = "";
                });
        }

        function renderBookCard(bookData) {
            const title = bookData.title || "Unknown Title Content";
            const authors = bookData.authors ? bookData.authors.map(a => a.name).join(", ") : "Unregistered Author Data";
            const publishers = bookData.publishers ? bookData.publishers.map(p => p.name).join(", ") : "N/A";
            const publishDate = bookData.publish_date || "N/A";
            
            // Process book jacket cover thumbnails
            const coverUrl = bookData.cover && bookData.cover.large ? bookData.cover.large : 'https://images.unsplash.com/photo-1543002588-bfa74002ed7e?q=80&w=300&auto=format&fit=crop';

            bookResult.innerHTML = `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col sm:flex-row gap-6 items-start">
                    <img src="${coverUrl}" alt="Jacket Cover graphic for ${title}" class="w-full sm:w-32 h-44 object-cover rounded-xl shadow-sm bg-gray-100 flex-shrink-0">
                    <div class="space-y-2 w-full">
                        <h2 class="text-xl font-bold text-gray-900 leading-snug">${title}</h2>
                        <p class="text-sm font-medium text-indigo-600">by ${authors}</p>
                        <hr class="border-gray-100 my-2">
                        <div class="grid grid-cols-2 gap-y-2 gap-x-4 text-xs text-gray-500">
                            <div><span class="font-semibold text-gray-400 block uppercase tracking-wider">Publisher</span> <span class="text-gray-700 font-medium">${publishers}</span></div>
                            <div><span class="font-semibold text-gray-400 block uppercase tracking-wider">Date Published</span> <span class="text-gray-700 font-medium">${publishDate}</span></div>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
