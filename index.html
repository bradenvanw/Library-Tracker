<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Librify — Library Tracker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- HTML5 QR Code Scanner -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    /* Custom Apple-inspired styling & scroll behavior */
    body {
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .glass-header {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .modal-sheet {
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-24 antialiased selection:bg-indigo-500 selection:text-white">

  <!-- TOP APP BAR -->
  <header class="sticky top-0 z-30 glass-header border-b border-gray-200/80 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center space-x-2">
      <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-sm">
        <i class="fa-solid fa-book-bookmark text-lg"></i>
      </div>
      <div>
        <h1 class="font-bold text-lg leading-tight tracking-tight text-gray-900">Librify</h1>
        <p id="sync-status" class="text-xs text-gray-500 font-medium">Ready</p>
      </div>
    </div>
    <!-- Profile / Active Reader Filter -->
    <div class="flex items-center space-x-2">
      <select id="active-profile-select" onchange="onProfileFilterChange()" class="bg-gray-100 border border-gray-300 text-gray-700 text-xs rounded-lg focus:ring-indigo-500 focus:border-indigo-500 p-2 font-medium">
        <option value="ALL">All Readers</option>
      </select>
    </div>
  </header>

  <!-- MAIN CONTAINER / TABS -->
  <main class="max-w-3xl mx-auto px-4 pt-4">

    <!-- TAB 1: CATALOG / HOME -->
    <section id="view-catalog" class="space-y-4">
      <!-- Search & Quick Filters -->
      <div class="space-y-2">
        <div class="relative">
          <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-3 text-gray-400"></i>
          <input type="text" id="catalog-search" oninput="renderCatalog()" placeholder="Search by title, author, ISBN..." 
                 class="w-full pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm">
        </div>
        <!-- Filter Pills Container -->
        <div id="dashboard-filter-pills" class="flex space-x-2 overflow-x-auto hide-scrollbar py-1 text-xs">
          <!-- Dynamically populated from settings -->
        </div>
      </div>

      <!-- Book Count Summary -->
      <div class="flex justify-between items-center text-xs text-gray-500 font-medium px-1">
        <span id="catalog-count">0 Books</span>
        <span id="active-filter-label">Filter: All</span>
      </div>

      <!-- Book Cards Grid/List -->
      <div id="catalog-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <!-- Rendered dynamically -->
      </div>
    </section>

    <!-- TAB 2: CIRCULATION / CHECKOUTS -->
    <section id="view-circulation" class="hidden space-y-4">
      <h2 class="text-lg font-bold text-gray-800">Circulation & Overdue</h2>
      <div id="circulation-list" class="space-y-3">
        <!-- Rendered dynamically -->
      </div>
    </section>

    <!-- TAB 3: SETTINGS -->
    <section id="view-settings" class="hidden space-y-6">
      <h2 class="text-lg font-bold text-gray-800">Library Settings</h2>
      
      <!-- Script URL Configuration -->
      <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 space-y-2">
        <label class="block text-xs font-semibold text-gray-600 uppercase">Google Apps Script Web App URL</label>
        <input type="text" id="setting-script-url" placeholder="https://script.google.com/macros/s/.../exec" 
               class="w-full text-xs p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
        <button onclick="saveScriptUrl()" class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-xs rounded-lg transition">
          Save Backend Link
        </button>
      </div>

      <!-- Settings Data Breakdown -->
      <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 space-y-4">
        <div class="flex justify-between items-center">
          <h3 class="font-semibold text-sm text-gray-800">Branches & Storage Locations</h3>
          <button onclick="saveSettingsToBackend()" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800">
            Sync Settings
          </button>
        </div>
        <p class="text-xs text-gray-500">Manage organizational branches and locations configured in Google Sheets.</p>
        <div id="settings-branches-preview" class="text-xs space-y-2">
          <!-- Rendered dynamically -->
        </div>
      </div>
    </section>
  </main>

  <!-- BOTTOM NAVIGATION BAR -->
  <nav class="fixed bottom-0 left-0 right-0 z-30 glass-header border-t border-gray-200/80 px-6 py-2">
    <div class="max-w-md mx-auto flex justify-around items-center text-xs font-medium text-gray-500">
      <button onclick="switchTab('catalog')" id="nav-catalog" class="flex flex-col items-center space-y-1 text-indigo-600">
        <i class="fa-solid fa-book text-lg"></i>
        <span>Catalog</span>
      </button>
      <button onclick="switchTab('circulation')" id="nav-circulation" class="flex flex-col items-center space-y-1 hover:text-gray-900">
        <i class="fa-solid fa-arrow-right-left text-lg"></i>
        <span>Status</span>
      </button>
      <button onclick="switchTab('settings')" id="nav-settings" class="flex flex-col items-center space-y-1 hover:text-gray-900">
        <i class="fa-solid fa-gear text-lg"></i>
        <span>Settings</span>
      </button>
    </div>
  </nav>

  <!-- FLOATING ACTION BUTTON (FAB) -->
  <button onclick="openActionSheet()" class="fixed bottom-20 right-5 z-40 bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-2xl transition-all">
    <i class="fa-solid fa-plus"></i>
  </button>

  <!-- ACTION SHEET MODAL (SCAN VS MANUAL) -->
  <div id="action-sheet" class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm hidden flex items-end sm:items-center justify-center p-0 sm:p-4">
    <div class="bg-white w-full max-w-sm rounded-t-3xl sm:rounded-2xl p-6 space-y-4 modal-sheet shadow-2xl">
      <div class="flex justify-between items-center border-b border-gray-100 pb-3">
        <h3 class="font-bold text-gray-900">Add New Book</h3>
        <button onclick="closeActionSheet()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <button onclick="closeActionSheet(); startScannerModal();" class="flex flex-col items-center justify-center p-4 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-xl space-y-2 transition border border-indigo-100">
          <i class="fa-solid fa-barcode text-3xl"></i>
          <span class="text-xs font-semibold">Scan Barcode</span>
        </button>
        <button onclick="closeActionSheet(); openBookModal();" class="flex flex-col items-center justify-center p-4 bg-gray-50 hover:bg-gray-100 text-gray-700 rounded-xl space-y-2 transition border border-gray-200">
          <i class="fa-solid fa-pen-to-square text-3xl"></i>
          <span class="text-xs font-semibold">Add Manually</span>
        </button>
      </div>
    </div>
  </div>

  <!-- SCANNER MODAL -->
  <div id="scanner-modal" class="fixed inset-0 z-50 bg-black hidden flex flex-col justify-between">
    <div class="p-4 flex justify-between items-center text-white z-10 glass-header bg-black/40">
      <span class="font-semibold text-sm">Align Barcode within Frame</span>
      <button onclick="stopScannerModal()" class="text-white text-xl p-2"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="flex-1 flex items-center justify-center p-4">
      <div id="interactive-scanner" class="w-full max-w-md overflow-hidden rounded-2xl border-2 border-indigo-500 shadow-2xl"></div>
    </div>
    <div class="p-6 text-center text-xs text-gray-400">
      Scanning will automatically query Google Books API
    </div>
  </div>

  <!-- BOOK DETAILS / EDIT SLIDING MODAL -->
  <div id="book-modal" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm hidden flex items-end justify-center">
    <div class="bg-white w-full max-w-xl max-h-[92vh] rounded-t-3xl flex flex-col overflow-hidden shadow-2xl modal-sheet">
      
      <!-- Modal Header -->
      <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50/50">
        <h3 id="modal-title-text" class="font-bold text-gray-900">Book Details</h3>
        <button onclick="closeBookModal()" class="text-gray-400 hover:text-gray-600 p-1">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>

      <!-- Modal Body (Form) -->
      <div class="p-6 overflow-y-auto space-y-4 flex-1 text-xs">
        <input type="hidden" id="input-uniqueid" />
        <input type="hidden" id="input-coverimage" />

        <!-- Metadata Overview -->
        <div class="flex space-x-4">
          <img id="input-cover-preview" src="https://via.placeholder.com/120x160?text=No+Cover" class="w-20 h-28 object-cover rounded-lg shadow-sm border border-gray-200" />
          <div class="flex-1 space-y-2">
            <div>
              <label class="block font-semibold text-gray-600">Title</label>
              <input type="text" id="input-title" class="w-full p-2 border border-gray-300 rounded-lg text-xs font-semibold focus:ring-indigo-500">
            </div>
            <div>
              <label class="block font-semibold text-gray-600">Author(s)</label>
              <input type="text" id="input-authors" class="w-full p-2 border border-gray-300 rounded-lg text-xs focus:ring-indigo-500">
            </div>
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="block font-semibold text-gray-600">ISBN</label>
                <input type="text" id="input-isbn" class="w-full p-2 border border-gray-300 rounded-lg text-xs focus:ring-indigo-500">
              </div>
              <div>
                <label class="block font-semibold text-gray-600">Pages</label>
                <input type="number" id="input-pagecount" class="w-full p-2 border border-gray-300 rounded-lg text-xs focus:ring-indigo-500">
              </div>
            </div>
          </div>
        </div>

        <!-- CASCADING BRANCH & LOCATION SELECTION -->
        <div class="grid grid-cols-2 gap-3 bg-indigo-50/50 p-3 rounded-xl border border-indigo-100">
          <div>
            <label for="input-branch" class="block font-semibold text-indigo-900 mb-1">Branch</label>
            <select id="input-branch" onchange="handleBranchChange()" class="w-full p-2 bg-white border border-indigo-200 rounded-lg focus:ring-indigo-500">
              <option value="">-- Select Branch --</option>
            </select>
          </div>
          <div>
            <label for="input-location" class="block font-semibold text-indigo-900 mb-1">Location</label>
            <select id="input-location" class="w-full p-2 bg-white border border-indigo-200 rounded-lg focus:ring-indigo-500">
              <option value="">-- Select Location --</option>
            </select>
          </div>
        </div>

        <!-- READER & STATUS -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block font-semibold text-gray-600 mb-1">Reader / Owner</label>
            <select id="input-reader" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-indigo-500">
              <option value="">-- Select Reader --</option>
            </select>
          </div>
          <div>
            <label class="block font-semibold text-gray-600 mb-1">Status</label>
            <select id="input-status" onchange="toggleBorrowerFields()" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-indigo-500">
              <option value="Available">Available</option>
              <option value="Checked Out">Checked Out</option>
              <option value="Wishlist">Wishlist</option>
            </select>
          </div>
        </div>

        <!-- BORROWER DETAILS (CONDITIONAL) -->
        <div id="borrower-section" class="hidden grid grid-cols-2 gap-3 bg-amber-50/60 p-3 rounded-xl border border-amber-200">
          <div>
            <label class="block font-semibold text-amber-900 mb-1">Borrower Name</label>
            <input type="text" id="input-borrower" class="w-full p-2 bg-white border border-amber-300 rounded-lg">
          </div>
          <div>
            <label class="block font-semibold text-amber-900 mb-1">Due Date</label>
            <input type="date" id="input-duedate" class="w-full p-2 bg-white border border-amber-300 rounded-lg">
          </div>
        </div>

        <!-- TAGS -->
        <div>
          <label class="block font-semibold text-gray-600 mb-1">Tags (Comma Separated)</label>
          <input type="text" id="input-tags" placeholder="e.g. Favorite, Hardcover, Sci-Fi" class="w-full p-2 border border-gray-300 rounded-lg">
        </div>

        <!-- NOTES FIELD -->
        <div>
          <label class="block font-semibold text-gray-600 mb-1">Personal Notes</label>
          <textarea id="input-notes" rows="3" placeholder="Add custom notes, review, condition details..." class="w-full p-2 border border-gray-300 rounded-lg"></textarea>
        </div>
      </div>

      <!-- Modal Footer -->
      <div class="p-4 border-t border-gray-200 bg-gray-50 flex justify-between items-center">
        <button id="btn-delete-book" onclick="confirmDeleteBook()" class="px-4 py-2 bg-rose-50 text-rose-600 border border-rose-200 hover:bg-rose-100 font-semibold rounded-xl transition">
          Delete
        </button>
        <div class="flex space-x-2">
          <button onclick="closeBookModal()" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 font-semibold rounded-xl text-gray-700">
            Cancel
          </button>
          <button onclick="saveBookFromModal()" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 font-semibold rounded-xl text-white shadow-sm">
            Save Book
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- APPLICATION LOGIC JS -->
  <script>
    // GLOBAL STATE
    let SCRIPT_URL = localStorage.getItem("librify_script_url") || "";
    let globalCatalogCache = [];
    let appSettings = {
      userBranches: ["Home", "Work"],
      userLocations: {
        "Home": ["Living Room Main", "Bedroom Table", "Unassigned / Pile"],
        "Work": ["Office Bookshelf"]
      },
      userTags: ["To Read", "Favorite", "Hardcover", "Borrowed"],
      householdMembers: ["Self", "Partner", "Child"],
      visibleDashboardFilters: []
    };
    let activeFilter = "ALL";
    let activeReader = "ALL";
    let html5QrCodeScanner = null;

    // INITIALIZATION
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("setting-script-url").value = SCRIPT_URL;
      if (SCRIPT_URL) {
        syncDataFromBackend();
      } else {
        updateSyncStatus("Configure Backend Link in Settings", true);
      }
    });

    // BACKEND SYNC
    async function syncDataFromBackend() {
      if (!SCRIPT_URL) return;
      updateSyncStatus("Syncing...");
      try {
        // Fetch Settings
        const settingsRes = await fetch(`${SCRIPT_URL}?action=getSettings`);
        const settingsData = await settingsRes.json();
        if (settingsData.status === "success" && settingsData.settings) {
          appSettings = Object.assign(appSettings, settingsData.settings);
          populateProfileDropdowns();
          renderSettingsPreview();
        }

        // Fetch Books
        const booksRes = await fetch(SCRIPT_URL);
        const booksData = await booksRes.json();
        if (booksData.status === "success") {
          globalCatalogCache = booksData.data || [];
          renderCatalog();
          renderCirculation();
          updateSyncStatus("Updated just now");
        }
      } catch (err) {
        console.error(err);
        updateSyncStatus("Sync Error", true);
      }
    }

    function updateSyncStatus(msg, isError = false) {
      const el = document.getElementById("sync-status");
      el.textContent = msg;
      el.className = isError ? "text-xs text-rose-500 font-medium" : "text-xs text-gray-500 font-medium";
    }

    // PROFILE & READER SELECTION
    function populateProfileDropdowns() {
      const activeSelect = document.getElementById("active-profile-select");
      const modalReaderSelect = document.getElementById("input-reader");

      activeSelect.innerHTML = '<option value="ALL">All Readers</option>';
      modalReaderSelect.innerHTML = '<option value="">-- Select Reader --</option>';

      (appSettings.householdMembers || []).forEach(member => {
        const opt1 = document.createElement("option");
        opt1.value = member;
        opt1.textContent = member;
        activeSelect.appendChild(opt1);

        const opt2 = document.createElement("option");
        opt2.value = member;
        opt2.textContent = member;
        modalReaderSelect.appendChild(opt2);
      });
    }

    function onProfileFilterChange() {
      activeReader = document.getElementById("active-profile-select").value;
      renderCatalog();
    }

    // CASCADING BRANCH & LOCATION DROPDOWNS
    function renderBranchAndLocationDropdowns(selectedBranch = "", selectedLocation = "") {
      const branchSelect = document.getElementById("input-branch");
      branchSelect.innerHTML = '<option value="">-- Select Branch --</option>';

      const branches = appSettings.userBranches || ["Home", "Work"];
      branches.forEach(branch => {
        const opt = document.createElement("option");
        opt.value = branch;
        opt.textContent = branch;
        if (branch === selectedBranch) opt.selected = true;
        branchSelect.appendChild(opt);
      });

      handleBranchChange(selectedLocation);
    }

    function handleBranchChange(targetLocation = "") {
      const branchSelect = document.getElementById("input-branch");
      const locationSelect = document.getElementById("input-location");
      const chosenBranch = branchSelect.value;

      locationSelect.innerHTML = '<option value="">-- Select Location --</option>';

      if (!chosenBranch || !appSettings.userLocations) return;

      let availableLocations = [];
      if (Array.isArray(appSettings.userLocations)) {
        availableLocations = appSettings.userLocations;
      } else if (appSettings.userLocations[chosenBranch]) {
        availableLocations = appSettings.userLocations[chosenBranch];
      }

      availableLocations.forEach(loc => {
        const opt = document.createElement("option");
        opt.value = loc;
        opt.textContent = loc;
        if (loc === targetLocation) opt.selected = true;
        locationSelect.appendChild(opt);
      });
    }

    // CATALOG RENDERING
    function renderCatalog() {
      const grid = document.getElementById("catalog-grid");
      const searchQuery = document.getElementById("catalog-search").value.toLowerCase();
      
      grid.innerHTML = "";

      const filtered = globalCatalogCache.filter(book => {
        const matchesSearch = (book.title || "").toLowerCase().includes(searchQuery) ||
                              (book.authors || "").toLowerCase().includes(searchQuery) ||
                              (book.isbn || "").includes(searchQuery);
        
        const matchesReader = (activeReader === "ALL") || (book.reader === activeReader);
        const matchesFilter = (activeFilter === "ALL") || 
                              (book.location === activeFilter) || 
                              (book.branch === activeFilter) ||
                              (book.tags || "").includes(activeFilter);

        return matchesSearch && matchesReader && matchesFilter;
      });

      document.getElementById("catalog-count").textContent = `${filtered.length} Books`;

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-400 text-xs">No books match your criteria.</div>`;
        return;
      }

      filtered.forEach(book => {
        const card = document.createElement("div");
        card.className = "bg-white p-3 rounded-2xl border border-gray-200/80 shadow-sm flex space-x-3 cursor-pointer hover:border-indigo-300 transition";
        card.onclick = () => openBookModal(book);

        const cover = book.coverImage || "https://via.placeholder.com/80x110?text=No+Cover";
        
        card.innerHTML = `
          <img src="${cover}" class="w-16 h-22 object-cover rounded-lg shadow-xs bg-gray-100 border border-gray-100" />
          <div class="flex-1 flex flex-col justify-between overflow-hidden">
            <div>
              <h4 class="font-bold text-xs text-gray-900 truncate">${book.title || "Untitled"}</h4>
              <p class="text-[11px] text-gray-500 truncate">${book.authors || "Unknown Author"}</p>
            </div>
            <div class="space-y-1">
              <div class="flex items-center space-x-1 text-[10px] text-gray-600">
                <i class="fa-solid fa-location-dot text-indigo-500"></i>
                <span class="truncate">${book.branch ? book.branch + ' • ' : ''}${book.location || 'Unassigned'}</span>
              </div>
              ${book.notes ? `<p class="text-[10px] text-amber-700 bg-amber-50 px-1.5 py-0.5 rounded italic truncate">${book.notes}</p>` : ''}
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // CIRCULATION VIEW
    function renderCirculation() {
      const list = document.getElementById("circulation-list");
      list.innerHTML = "";

      const checkedOut = globalCatalogCache.filter(b => b.status === "Checked Out");

      if (checkedOut.length === 0) {
        list.innerHTML = `<p class="text-xs text-gray-400 text-center py-8">No books currently checked out.</p>`;
        return;
      }

      checkedOut.forEach(book => {
        const item = document.createElement("div");
        item.className = "bg-white p-4 rounded-xl border border-gray-200 flex justify-between items-center";
        item.innerHTML = `
          <div>
            <h4 class="font-bold text-xs text-gray-900">${book.title}</h4>
            <p class="text-xs text-gray-500">Borrowed by: <span class="font-semibold text-gray-700">${book.borrower || "Unknown"}</span></p>
            <p class="text-[10px] text-rose-500">Due: ${book.dueDate || "N/A"}</p>
          </div>
          <button onclick="returnBook('${book.uniqueId}')" class="px-3 py-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-semibold text-xs rounded-lg">
            Return
          </button>
        `;
        list.appendChild(item);
      });
    }

    // MODAL & FORM HANDLERS
    function openBookModal(book = null) {
      document.getElementById("book-modal").classList.remove("hidden");
      
      if (book) {
        document.getElementById("modal-title-text").textContent = "Edit Book";
        document.getElementById("input-uniqueid").value = book.uniqueId || "";
        document.getElementById("input-title").value = book.title || "";
        document.getElementById("input-authors").value = book.authors || "";
        document.getElementById("input-isbn").value = book.isbn || "";
        document.getElementById("input-pagecount").value = book.pageCount || "";
        document.getElementById("input-reader").value = book.reader || "";
        document.getElementById("input-status").value = book.status || "Available";
        document.getElementById("input-borrower").value = book.borrower || "";
        document.getElementById("input-duedate").value = book.dueDate || "";
        document.getElementById("input-tags").value = book.tags || "";
        document.getElementById("input-notes").value = book.notes || "";
        document.getElementById("input-coverimage").value = book.coverImage || "";
        document.getElementById("input-cover-preview").src = book.coverImage || "https://via.placeholder.com/120x160?text=No+Cover";
        
        renderBranchAndLocationDropdowns(book.branch, book.location);
        document.getElementById("btn-delete-book").classList.remove("hidden");
      } else {
        document.getElementById("modal-title-text").textContent = "Add New Book";
        document.getElementById("input-uniqueid").value = "id_" + Date.now();
        document.getElementById("input-title").value = "";
        document.getElementById("input-authors").value = "";
        document.getElementById("input-isbn").value = "";
        document.getElementById("input-pagecount").value = "";
        document.getElementById("input-status").value = "Available";
        document.getElementById("input-borrower").value = "";
        document.getElementById("input-duedate").value = "";
        document.getElementById("input-tags").value = "";
        document.getElementById("input-notes").value = "";
        document.getElementById("input-coverimage").value = "";
        document.getElementById("input-cover-preview").src = "https://via.placeholder.com/120x160?text=No+Cover";

        renderBranchAndLocationDropdowns();
        document.getElementById("btn-delete-book").classList.add("hidden");
      }
      toggleBorrowerFields();
    }

    function closeBookModal() {
      document.getElementById("book-modal").classList.add("hidden");
    }

    function toggleBorrowerFields() {
      const status = document.getElementById("input-status").value;
      const section = document.getElementById("borrower-section");
      if (status === "Checked Out") {
        section.classList.remove("hidden");
      } else {
        section.classList.add("hidden");
      }
    }

    // SAVE BOOK TO GOOGLE SHEETS
    async function saveBookFromModal() {
      const payload = {
        uniqueId: document.getElementById("input-uniqueid").value,
        title: document.getElementById("input-title").value,
        authors: document.getElementById("input-authors").value,
        isbn: document.getElementById("input-isbn").value,
        pageCount: document.getElementById("input-pagecount").value,
        branch: document.getElementById("input-branch").value,
        location: document.getElementById("input-location").value,
        reader: document.getElementById("input-reader").value,
        status: document.getElementById("input-status").value,
        borrower: document.getElementById("input-borrower").value,
        dueDate: document.getElementById("input-duedate").value,
        tags: document.getElementById("input-tags").value,
        notes: document.getElementById("input-notes").value,
        coverImage: document.getElementById("input-coverimage").value
      };

      closeBookModal();
      updateSyncStatus("Saving book...");

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        await syncDataFromBackend();
      } catch (err) {
        console.error(err);
        updateSyncStatus("Save Failed", true);
      }
    }

    // DELETE BOOK
    async function confirmDeleteBook() {
      const uniqueId = document.getElementById("input-uniqueid").value;
      if (!confirm("Are you sure you want to delete this book?")) return;

      closeBookModal();
      updateSyncStatus("Deleting...");

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({ action: "deleteBook", uniqueId: uniqueId })
        });
        await syncDataFromBackend();
      } catch (err) {
        console.error(err);
        updateSyncStatus("Delete Failed", true);
      }
    }

    // BARCODE SCANNING & LOOKUP
    function startScannerModal() {
      document.getElementById("scanner-modal").classList.remove("hidden");
      html5QrCodeScanner = new Html5Qrcode("interactive-scanner");
      html5QrCodeScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 150 } },
        onBarcodeDetected
      );
    }

    function stopScannerModal() {
      if (html5QrCodeScanner) {
        html5QrCodeScanner.stop().then(() => {
          document.getElementById("scanner-modal").classList.add("hidden");
        });
      } else {
        document.getElementById("scanner-modal").classList.add("hidden");
      }
    }

    async function onBarcodeDetected(isbn) {
      stopScannerModal();
      updateSyncStatus(`Looking up ISBN: ${isbn}...`);
      
      try {
        const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
        const data = await res.json();
        
        if (data.items && data.items.length > 0) {
          const info = data.items[0].volumeInfo;
          openBookModal({
            isbn: isbn,
            title: info.title || "",
            authors: (info.authors || []).join(", "),
            pageCount: info.pageCount || "",
            coverImage: info.imageLinks ? info.imageLinks.thumbnail : ""
          });
          updateSyncStatus("Book found!");
        } else {
          alert("Book not found on Google Books API. Please enter details manually.");
          openBookModal({ isbn: isbn });
        }
      } catch (err) {
        console.error(err);
        openBookModal({ isbn: isbn });
      }
    }

    // UI TAB SWITCHING & UTILS
    function switchTab(tab) {
      ['catalog', 'circulation', 'settings'].forEach(t => {
        document.getElementById(`view-${t}`).classList.add("hidden");
        document.getElementById(`nav-${t}`).className = "flex flex-col items-center space-y-1 hover:text-gray-900";
      });
      document.getElementById(`view-${tab}`).classList.remove("hidden");
      document.getElementById(`nav-${tab}`).className = "flex flex-col items-center space-y-1 text-indigo-600 font-bold";
    }

    function openActionSheet() { document.getElementById("action-sheet").classList.remove("hidden"); }
    function closeActionSheet() { document.getElementById("action-sheet").classList.add("hidden"); }

    function saveScriptUrl() {
      const url = document.getElementById("setting-script-url").value.trim();
      localStorage.setItem("librify_script_url", url);
      SCRIPT_URL = url;
      syncDataFromBackend();
    }

    function renderSettingsPreview() {
      const container = document.getElementById("settings-branches-preview");
      container.innerHTML = "";
      
      const branches = appSettings.userBranches || [];
      branches.forEach(b => {
        const locs = (appSettings.userLocations && appSettings.userLocations[b]) ? appSettings.userLocations[b].join(", ") : "None";
        const div = document.createElement("div");
        div.className = "bg-gray-50 p-2 rounded border border-gray-200";
        div.innerHTML = `<span class="font-bold text-gray-800">${b}:</span> <span class="text-gray-600">${locs}</span>`;
        container.appendChild(div);
      });
    }

    async function saveSettingsToBackend() {
      updateSyncStatus("Saving Settings...");
      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({ action: "saveSettings", settings: appSettings })
        });
        updateSyncStatus("Settings Saved");
      } catch (err) {
        console.error(err);
        updateSyncStatus("Settings Save Failed", true);
      }
    }
  </script>
</body>
</html>
